services:
  # Android Redroid Container
  redroid:
    image: redroid/redroid:11.0.0-latest
    privileged: true
    ports:
      - "5555:5555"     # ADB
    volumes:
      - android-data:/data
      - ./profiles:/profiles
    command:
      # Screen configuration (from original.json)
      - androidboot.redroid_width=1080
      - androidboot.redroid_height=2340
      - androidboot.redroid_dpi=440
      - androidboot.redroid_fps=60
      - androidboot.redroid_gpu_mode=guest
      # Device identity (ro.* properties - READ ONLY, must be set at boot)
      - ro.product.model=ONEPLUS A6010
      - ro.product.brand=OnePlus
      - ro.product.manufacturer=OnePlus
      - ro.product.device=OnePlus6T
      - ro.product.name=OnePlus6T
      - ro.build.product=OnePlus6T
      - ro.product.board=sdm845
      - ro.hardware=qcom
      - ro.build.version.release=11
      - ro.build.version.sdk=30
    healthcheck:
      test: ["CMD", "getprop", "sys.boot_completed"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - fpnet

  # Controller - Sets up device and runs automation
  controller:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redroid:
        condition: service_healthy
    volumes:
      - ./profiles:/app/profiles
      - ../original.json:/app/profiles/original.json:ro
      - ./output:/app/output
    environment:
      - PROFILE_PATH=/app/profiles/original.json
      - REDROID_HOST=redroid
      - REDROID_ADB_PORT=5555
      - CHROME_DEBUG_PORT=9222
      - TARGET_URL=${TARGET_URL:-https://botxbyte.com/fp.php}
      - SAVE_RESULT=true
    networks:
      - fpnet

networks:
  fpnet:
    driver: bridge

volumes:
  android-data:
