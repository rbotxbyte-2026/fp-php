name: Fingerprint Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to test fingerprint'
        required: false
        default: 'https://botxbyte.com/fp.php'

jobs:
  test-fingerprint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load kernel modules for Redroid
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-modules-extra-$(uname -r)
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
          sudo modprobe ashmem_linux || true

      - name: Create profiles directory
        run: mkdir -p docker/profiles

      - name: Copy profile
        run: cp original.json docker/profiles/

      - name: Start Redroid
        run: |
          cd docker
          docker compose -f docker-compose.vnc.yml up -d redroid
          
          # Wait for Redroid to boot with progress
          echo "Waiting for Redroid to boot..."
          for i in $(seq 1 60); do
            STATUS=$(docker exec docker-redroid-1 getprop sys.boot_completed 2>/dev/null || echo "not ready")
            echo "Boot status ($i/60): $STATUS"
            if [ "$STATUS" = "1" ]; then
              echo "Redroid booted!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "=== Redroid logs ==="
              docker logs docker-redroid-1 --tail 50 2>&1 || true
              echo "==================="
            fi
            sleep 5
          done
          
          # Final status check
          FINAL=$(docker exec docker-redroid-1 getprop sys.boot_completed 2>/dev/null || echo "failed")
          if [ "$FINAL" != "1" ]; then
            echo "Redroid failed to boot. Final logs:"
            docker logs docker-redroid-1 2>&1 || true
            exit 1
          fi

      - name: Install Chromium on Redroid
        run: |
          # Install ADB
          sudo apt-get install -y android-tools-adb
          
          # Connect to Redroid
          adb connect localhost:5555
          adb -s localhost:5555 wait-for-device
          
          # Get root access
          adb -s localhost:5555 root || true
          sleep 2
          adb disconnect localhost:5555
          adb connect localhost:5555
          adb -s localhost:5555 wait-for-device
          
          echo "Downloading Chromium APK for x86_64 Android..."
          
          # Get latest Chromium snapshot version for Android x64
          CHROMIUM_BASE="https://commondatastorage.googleapis.com/chromium-browser-snapshots/Android_x64"
          LATEST_VERSION=$(curl -s "${CHROMIUM_BASE}/LAST_CHANGE")
          echo "Latest Chromium version: $LATEST_VERSION"
          
          # Download the APK
          if [ -n "$LATEST_VERSION" ]; then
            curl -L -o chromium.apk "${CHROMIUM_BASE}/${LATEST_VERSION}/ChromePublic.apk" || true
          fi
          
          # Fallback to alternative sources if official download failed
          if [ ! -s chromium.apk ]; then
            echo "Official download failed, trying alternatives..."
            # Try Kiwi Browser (Chromium-based, supports x86_64)
            curl -L -o chromium.apk "https://github.com/nicholaschiang/nicholaschiang.com/releases/download/chromium/Chromium_121.0.6167.101_x64.apk" 2>/dev/null || true
          fi
          
          if [ ! -s chromium.apk ]; then
            # Last resort: use Fennec (Firefox) from F-Droid 
            echo "Trying Fennec F-Droid..."
            curl -L -o fennec.apk "https://f-droid.org/repo/org.mozilla.fennec_fdroid_121010.apk" 2>/dev/null || true
            if [ -s fennec.apk ]; then
              mv fennec.apk chromium.apk
            fi
          fi
          
          # Install the APK if we got one
          if [ -s chromium.apk ]; then
            echo "Installing browser APK ($(du -h chromium.apk | cut -f1))..."
            adb -s localhost:5555 install -r -g chromium.apk && echo "Browser installed!" || echo "Install failed"
          else
            echo "ERROR: Could not download any browser APK"
            echo "Listing available apps on Redroid:"
            adb -s localhost:5555 shell pm list packages
          fi
          
          # Verify installation
          echo ""
          echo "=== Browser packages installed ==="
          adb -s localhost:5555 shell pm list packages | grep -iE "chrom|browser|mozilla|fennec" || echo "No browser found"

      - name: Run fingerprint test
        run: |
          cd docker
          docker compose -f docker-compose.vnc.yml up controller
          
      - name: Get results
        run: |
          docker cp docker-controller-1:/app/result.json ./fingerprint-result.json 2>/dev/null || true
          if [ -f fingerprint-result.json ]; then
            echo "Fingerprint result:"
            cat fingerprint-result.json | jq .
          else
            echo "No fingerprint result file found"
            # Get controller logs for debugging
            docker logs docker-controller-1 2>&1 || true
          fi

      - name: Upload fingerprint result
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-result
          path: fingerprint-result.json
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          cd docker
          docker compose -f docker-compose.vnc.yml down -v
