name: Fingerprint Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to test fingerprint'
        required: false
        default: 'https://botxbyte.com/fp.php'

jobs:
  test-fingerprint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load kernel modules for Redroid
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-modules-extra-$(uname -r)
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
          sudo modprobe ashmem_linux || true

      - name: Create profiles directory
        run: mkdir -p docker/profiles

      - name: Copy profile
        run: cp original.json docker/profiles/

      - name: Start Redroid
        run: |
          cd docker
          docker compose -f docker-compose.vnc.yml up -d redroid
          
          # Wait for Redroid to boot with progress
          echo "Waiting for Redroid to boot..."
          for i in $(seq 1 60); do
            STATUS=$(docker exec docker-redroid-1 getprop sys.boot_completed 2>/dev/null || echo "not ready")
            echo "Boot status ($i/60): $STATUS"
            if [ "$STATUS" = "1" ]; then
              echo "Redroid booted!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "=== Redroid logs ==="
              docker logs docker-redroid-1 --tail 50 2>&1 || true
              echo "==================="
            fi
            sleep 5
          done
          
          # Final status check
          FINAL=$(docker exec docker-redroid-1 getprop sys.boot_completed 2>/dev/null || echo "failed")
          if [ "$FINAL" != "1" ]; then
            echo "Redroid failed to boot. Final logs:"
            docker logs docker-redroid-1 2>&1 || true
            exit 1
          fi

      - name: Install Chromium on Redroid
        run: |
          # Install ADB
          sudo apt-get install -y android-tools-adb
          
          # Connect to Redroid
          adb connect localhost:5555
          adb -s localhost:5555 wait-for-device
          
          # Get root access
          adb -s localhost:5555 root || true
          sleep 2
          adb disconnect localhost:5555
          adb connect localhost:5555
          adb -s localhost:5555 wait-for-device
          
          echo "Downloading Chrome/Chromium APK for x86_64 Android..."
          
          # Method 1: Try Chrome from archived builds
          echo "Trying archived Chromium build..."
          curl -L --connect-timeout 30 --max-time 300 -o chromium.apk \
            "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/Android%2F1000022%2Fchrome-android.apk?alt=media" 2>/dev/null || true
          
          # Method 2: Try specific known working Chromium version
          if [ ! -s chromium.apk ] || [ $(stat -f%z chromium.apk 2>/dev/null || stat -c%s chromium.apk) -lt 10000000 ]; then
            echo "Trying alternative source..."
            rm -f chromium.apk 2>/dev/null
            # Use a prebuilt x86_64 Chrome APK from GitHub releases
            curl -L --connect-timeout 30 --max-time 300 -o chromium.apk \
              "https://github.com/nicholaschiang/nicholaschiang.com/releases/download/chrome/Chrome_127.0.6533.72_x86_64.apk" 2>/dev/null || true
          fi
          
          # Method 3: Try via APKCombo/APKPure redirect
          if [ ! -s chromium.apk ] || [ $(stat -f%z chromium.apk 2>/dev/null || stat -c%s chromium.apk) -lt 10000000 ]; then
            echo "Trying APK hosting service..."
            rm -f chromium.apk 2>/dev/null
            curl -L --connect-timeout 30 --max-time 300 -o chromium.apk \
              "https://github.com/nicholaschiang/nicholaschiang.com/releases/download/brave/Brave_Browser_1.67.134_x86_64.apk" 2>/dev/null || true
          fi
          
          # Install if we got a valid APK (at least 10MB)
          APK_SIZE=$(stat -f%z chromium.apk 2>/dev/null || stat -c%s chromium.apk 2>/dev/null || echo 0)
          if [ "$APK_SIZE" -gt 10000000 ]; then
            echo "Installing browser APK ($(du -h chromium.apk | cut -f1))..."
            adb -s localhost:5555 install -r -g chromium.apk && echo "Browser installed!" || echo "Install failed"
          else
            echo "No valid browser APK downloaded (size: $APK_SIZE bytes)"
            echo "Will use pre-installed WebView shell"
          fi
          
          # Enable WebView DevTools on the pre-installed shell (fallback)
          echo ""
          echo "Enabling WebView remote debugging..."
          adb -s localhost:5555 shell "setprop webview.enable_remote_debugging 1" || true
          adb -s localhost:5555 shell "setprop debug.chromium.android.browser true" || true
          
          # Verify installation
          echo ""
          echo "=== Browser packages installed ==="
          adb -s localhost:5555 shell pm list packages | grep -iE "chrom|browser|brave" || echo "No browser found"

      - name: Run fingerprint test
        run: |
          cd docker
          docker compose -f docker-compose.vnc.yml up controller
          
      - name: Get results
        run: |
          docker cp docker-controller-1:/app/result.json ./fingerprint-result.json 2>/dev/null || true
          if [ -f fingerprint-result.json ]; then
            echo "Fingerprint result:"
            cat fingerprint-result.json | jq .
          else
            echo "No fingerprint result file found"
            # Get controller logs for debugging
            docker logs docker-controller-1 2>&1 || true
          fi

      - name: Upload fingerprint result
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-result
          path: fingerprint-result.json
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          cd docker
          docker compose -f docker-compose.vnc.yml down -v
