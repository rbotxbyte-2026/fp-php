name: Chrome Desktop with Extension

on:
  workflow_dispatch:

jobs:
  chrome-desktop:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: |
            ~/apt-cache
          key: apt-desktop-${{ runner.os }}-v2
          restore-keys: |
            apt-desktop-${{ runner.os }}-

      - name: Install Desktop Environment
        run: |
          # Restore cached packages if available
          if [ -d ~/apt-cache ] && [ "$(ls -A ~/apt-cache 2>/dev/null)" ]; then
            echo "Restoring cached apt packages..."
            sudo cp -r ~/apt-cache/* /var/cache/apt/archives/ 2>/dev/null || true
          fi
          
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-goodies x11vnc xvfb novnc websockify jq
          
          # Cache the downloaded packages for next run
          mkdir -p ~/apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true
          
          echo "Chrome version:"
          google-chrome --version

      - name: Cache ngrok
        uses: actions/cache@v4
        id: cache-ngrok
        with:
          path: |
            /usr/bin/ngrok
            /etc/apt/sources.list.d/ngrok.list
            /etc/apt/trusted.gpg.d/ngrok.asc
          key: ngrok-${{ runner.os }}-v1

      - name: Setup ngrok
        run: |
          if ! command -v ngrok &> /dev/null; then
            echo "Installing ngrok..."
            curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
              | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
            echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
              | sudo tee /etc/apt/sources.list.d/ngrok.list
            sudo apt-get update && sudo apt-get install -y ngrok
          else
            echo "Using cached ngrok"
          fi
          ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}

      - name: Setup Extension
        run: |
          mkdir -p ~/Downloads/fp-spoofer-extension
          mkdir -p ~/Desktop
          cp -r extension/* ~/Downloads/fp-spoofer-extension/
          cp original.json ~/Downloads/
          
          # Generate random profile directory name
          RANDOM_PROFILE="chrome_profile_$(head /dev/urandom | tr -dc 'a-z0-9' | head -c 12)"
          mkdir -p "/tmp/$RANDOM_PROFILE"
          
          # Chrome desktop shortcut with random profile
          echo '[Desktop Entry]' > ~/Desktop/Chrome.desktop
          echo 'Type=Application' >> ~/Desktop/Chrome.desktop
          echo 'Name=Google Chrome' >> ~/Desktop/Chrome.desktop
          echo "Exec=google-chrome --no-first-run --user-data-dir=/tmp/$RANDOM_PROFILE" >> ~/Desktop/Chrome.desktop
          echo 'Icon=google-chrome' >> ~/Desktop/Chrome.desktop
          echo 'Terminal=false' >> ~/Desktop/Chrome.desktop
          chmod +x ~/Desktop/Chrome.desktop
          
          echo "Random profile: /tmp/$RANDOM_PROFILE"

      - name: Start Desktop and VNC
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          startxfce4 &
          sleep 3
          x11vnc -display :99 -forever -shared -rfbport 5900 -bg -nopw
          /usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080 &
          sleep 2

      - name: Start ngrok tunnel
        run: |
          ngrok http 6080 --log=stdout > ngrok.log 2>&1 &
          sleep 5
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          echo "========================================"
          echo "  noVNC: $NGROK_URL"
          echo "========================================"
          echo ""
          echo "Extension: /home/runner/Downloads/fp-spoofer-extension"
          echo ""
          echo "In terminal run: google-chrome"
          echo ""
          echo "========================================"

      - name: Keep session alive
        run: sleep 1800
